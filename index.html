<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fork & Founders — Own a Food Brand in Dubai | Cloud Kitchen UAE</title>
    <meta name="description" content="Launch your own food delivery brand in Dubai & UAE without a kitchen or staff. We cook, deliver & run it all. 60+ brands live. 20+ cuisines. Get your free brand plan today." />
    <meta property="og:title" content="Fork & Founders — Own a Food Brand in Dubai" />
    <meta property="og:description" content="Launch your own food delivery brand in Dubai & UAE without a kitchen or staff. 60+ brands live across Dubai." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/hero-food.jpg" />
    <meta name="keywords" content="own a food brand Dubai, start food delivery business Dubai, cloud kitchen UAE, launch food brand UAE, delivery kitchen business UAE, virtual restaurant Dubai, ghost kitchen Dubai, managed cloud kitchen services" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/hero-mobile-fix.css" />
    <link rel="stylesheet" href="/pricing-fix.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        function mountHeroVideo() {
          var root = document.getElementById('root');
          if (!root || root.dataset.heroVideoMounted === 'true') return false;
          var hero = root.querySelector('section.relative');
          if (!hero) return false;
          var heroInner = hero.querySelector(':scope > div');
          if (!heroInner) return false;
          root.dataset.heroVideoMounted = 'true';
          hero.setAttribute('data-hero-video', 'true');
          var layer = document.createElement('div');
          layer.className = 'hero-video-layer';
          layer.setAttribute('aria-hidden', 'true');
          var video = document.createElement('video');
          video.autoplay = true;
          video.muted = true;
          video.loop = true;
          video.playsInline = true;
          video.preload = 'metadata';
          video.poster = '/hero-food.jpg';
          video.setAttribute('muted', '');
          video.setAttribute('playsinline', '');
          var source = document.createElement('source');
          source.src = '/videos/fork-founders-bg.mp4.mp4';
          source.type = 'video/mp4';
          video.appendChild(source);
          layer.appendChild(video);
          var overlay = document.createElement('div');
          overlay.className = 'hero-video-overlay';
          overlay.setAttribute('aria-hidden', 'true');
          heroInner.insertBefore(layer, heroInner.firstChild);
          heroInner.insertBefore(overlay, layer.nextSibling);
          video.play().catch(function () {});
          return true;
        }

        function applyPricingPackages() {
          var cards = document.querySelectorAll('#pricing .pr-card');
          if (cards.length !== 3 || document.body.dataset.pricingFixed === 'true') return false;
          document.body.dataset.pricingFixed = 'true';

          var packages = [
            {
              name: 'Hybrid Plan',
              desc: 'Lower monthly, with a one-time yearly setup.',
              price: 'AED 2,500',
              period: '/ month',
              subline: '<strong>+ AED 20,000</strong> one-time setup (yearly)',
              features: ['Full brand build & launch', 'All delivery apps managed', 'Cooking, packaging & dispatch', 'Dedicated account manager'],
              cta: 'Choose Hybrid'
            },
            {
              name: 'Monthly Plan',
              desc: 'No upfront setup fee. The easiest way to begin.',
              price: 'AED 4,600',
              period: '/ month',
              subline: 'No setup fee · <strong>Start from AED 13,800</strong> (first 3 months)',
              features: ['Full brand build & launch', 'All delivery apps managed', 'Cooking, packaging & dispatch', 'No long upfront commitment'],
              cta: 'Start monthly',
              badge: 'Most popular to start'
            },
            {
              name: 'Yearly Plan',
              desc: 'One payment for the year. Best long-term value.',
              price: 'AED 45,000',
              period: '/ year',
              subline: 'One-time yearly fee · <strong>No monthly payments</strong>',
              features: ['Full brand build & launch', 'All delivery apps managed', 'Cooking, packaging & dispatch', 'No ongoing monthly commitment'],
              cta: 'Choose yearly'
            }
          ];

          cards.forEach(function (card, index) {
            var data = packages[index];
            card.classList.add('pricing-card-updated');
            card.classList.toggle('pricing-featured', index === 1);
            var badge = card.querySelector('.absolute.-top-3');
            if (data.badge) {
              if (!badge) {
                badge = document.createElement('div');
                card.appendChild(badge);
              }
              badge.className = 'pricing-badge absolute -top-3 left-1/2 -translate-x-1/2 px-4 py-1.5 rounded-pill font-bold';
              badge.textContent = data.badge;
            } else if (badge) {
              badge.remove();
            }

            var heading = card.querySelector('h3');
            if (heading) { heading.textContent = data.name; heading.classList.add('pricing-name'); }
            var desc = heading ? heading.nextElementSibling : null;
            if (desc) { desc.textContent = data.desc; desc.classList.add('pricing-desc'); }
            var price = card.querySelector('.text-3xl');
            if (price) { price.textContent = data.price; price.classList.add('pricing-price'); }
            var period = card.querySelector('.text-3xl + span');
            if (period) { period.textContent = data.period; period.classList.add('pricing-period'); }

            var priceWrap = price ? price.parentElement && price.parentElement.parentElement : null;
            if (priceWrap) {
              var existingSubline = priceWrap.querySelector('.pricing-subline');
              if (!existingSubline) {
                existingSubline = document.createElement('p');
                existingSubline.className = 'pricing-subline text-sm mt-3 leading-relaxed';
                priceWrap.appendChild(existingSubline);
              }
              existingSubline.innerHTML = data.subline;
            }

            var divider = card.querySelector('.h-px');
            if (divider) divider.classList.add('pricing-line');
            var list = card.querySelector('ul');
            if (list) {
              list.innerHTML = '';
              data.features.forEach(function (feature) {
                var item = document.createElement('li');
                item.className = 'flex items-start gap-2.5';
                item.innerHTML = '<span class="pricing-check rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">✓</span><span class="pricing-feature-text">' + feature + '</span>';
                list.appendChild(item);
              });
            }

            var button = card.querySelector('button');
            if (button) { button.textContent = data.cta; button.classList.add('pricing-button'); }
            card.querySelectorAll('p.text-\[11px\]').forEach(function (note) { note.remove(); });
          });

          var intro = document.querySelector('#pricing .pr-header p');
          if (intro) intro.textContent = 'Every package includes the exact same full service. The only difference is how you prefer to pay.';
          var bottom = document.querySelector('#pricing > div > p:last-child');
          if (bottom) { bottom.textContent = ''; bottom.classList.add('hidden'); }
          return true;
        }

        if (!mountHeroVideo() || !applyPricingPackages()) {
          var observer = new MutationObserver(function () {
            var heroDone = mountHeroVideo();
            var pricingDone = applyPricingPackages();
            if (heroDone && pricingDone) observer.disconnect();
          });
          observer.observe(document.getElementById('root'), { childList: true, subtree: true });
          window.setTimeout(function () { observer.disconnect(); }, 7000);
        }
      })();
    </script>
  </body>
</html>
